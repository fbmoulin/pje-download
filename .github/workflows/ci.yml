name: CI

on:
  push:
    branches: [master]
    paths-ignore: ["**.md", "docs/**", ".serena/**", ".claude/**"]
  pull_request:
    paths-ignore: ["**.md", "docs/**", ".serena/**", ".claude/**"]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check
        run: ruff check dashboard_api.py batch_downloader.py mni_client.py worker.py gdrive_downloader.py metrics.py config.py

      - name: Format
        run: ruff format --check dashboard_api.py batch_downloader.py mni_client.py worker.py gdrive_downloader.py metrics.py config.py

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      MNI_USERNAME: ""
      MNI_PASSWORD: ""
      MNI_TRIBUNAL: TJES
      REDIS_URL: redis://localhost:6379
      DOWNLOAD_BASE_DIR: /tmp/pje-test-downloads

    services:
      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short
