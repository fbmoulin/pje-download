name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    needs: []

    steps:
      - uses: actions/checkout@v6

      - name: Sync files to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='downloads_batch/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.serena/' \
            --exclude='.claude/' \
            --exclude='.pytest_cache/' \
            --exclude='.worktrees/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${VPS_USER}@${VPS_HOST}:/opt/pje-download/"

      - name: Write .env on VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          MNI_USERNAME: ${{ secrets.MNI_USERNAME }}
          MNI_PASSWORD: ${{ secrets.MNI_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: MNI_USERNAME,MNI_PASSWORD,REDIS_PASSWORD,DASHBOARD_API_KEY
          script: |
            : "${MNI_USERNAME:?missing MNI_USERNAME secret}"
            : "${MNI_PASSWORD:?missing MNI_PASSWORD secret}"
            : "${REDIS_PASSWORD:?missing REDIS_PASSWORD secret}"
            : "${DASHBOARD_API_KEY:?missing DASHBOARD_API_KEY secret}"
            {
              printf 'APP_ENV=production\n'
              printf 'MNI_USERNAME=%s\n' "${MNI_USERNAME}"
              printf 'MNI_PASSWORD=%s\n' "${MNI_PASSWORD}"
              printf 'MNI_TRIBUNAL=TJES\n'
              printf 'MNI_TIMEOUT=60\n'
              printf 'MNI_BATCH_SIZE=5\n'
              printf 'MNI_ENABLED=true\n'
              printf 'PJE_BASE_URL=https://pje.tjes.jus.br/pje\n'
              printf 'DASHBOARD_API_KEY=%s\n' "${DASHBOARD_API_KEY}"
              printf 'REDIS_PASSWORD=%s\n' "${REDIS_PASSWORD}"
              printf 'REDIS_URL=redis://:%s@redis:6379\n' "${REDIS_PASSWORD}"
              printf 'DOWNLOAD_BASE_DIR=/data/downloads\n'
              printf 'HEALTH_PORT=8006\n'
              printf 'DASHBOARD_PORT=8007\n'
              printf 'WORKER_HEALTH_HOST=worker\n'
              printf 'TRUST_X_FORWARDED_FOR=false\n'
              printf 'AUDIT_LOG_RETENTION_DAYS=90\n'
            } > /opt/pje-download/.env

      - name: Restart services
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/pje-download
            docker compose --profile worker up -d --build dashboard worker

            echo "Waiting for worker healthcheck..."
            for i in $(seq 1 24); do
              worker_health=$(curl -fsS http://localhost:8006/health || true)
              if printf '%s' "$worker_health" | grep -Eq '"healthy"[[:space:]]*:[[:space:]]*true'; then
                break
              fi
              sleep 5
            done
            printf '%s' "$worker_health" | grep -Eq '"healthy"[[:space:]]*:[[:space:]]*true'

            echo "Waiting for dashboard healthcheck..."
            for i in $(seq 1 24); do
              dashboard_status=$(curl -fsS http://localhost:8007/api/status || true)
              if printf '%s' "$dashboard_status" | grep -Eq '"worker_status"[[:space:]]*:[[:space:]]*"(ready|consuming)"'; then
                break
              fi
              sleep 5
            done
            printf '%s' "$dashboard_status" | grep -Eq '"worker_status"[[:space:]]*:[[:space:]]*"(ready|consuming)"'
            echo "Deploy OK"
