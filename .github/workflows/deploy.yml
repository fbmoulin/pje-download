name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    needs: []

    steps:
      - uses: actions/checkout@v6

      - name: Sync files to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='downloads_batch/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.serena/' \
            --exclude='.claude/' \
            --exclude='.pytest_cache/' \
            --exclude='.worktrees/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${VPS_USER}@${VPS_HOST}:/opt/pje-download/"

      - name: Write .env on VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          MNI_USERNAME: ${{ secrets.MNI_USERNAME }}
          MNI_PASSWORD: ${{ secrets.MNI_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: MNI_USERNAME,MNI_PASSWORD
          script: |
            {
              printf 'MNI_USERNAME=%s\n' "${MNI_USERNAME}"
              printf 'MNI_PASSWORD=%s\n' "${MNI_PASSWORD}"
              printf 'MNI_TRIBUNAL=TJES\n'
              printf 'MNI_TIMEOUT=60\n'
              printf 'MNI_BATCH_SIZE=5\n'
              printf 'MNI_ENABLED=true\n'
              printf 'PJE_BASE_URL=https://pje.tjes.jus.br/pje\n'
              printf 'REDIS_PASSWORD=pje_redis_2026\n'
              printf 'REDIS_URL=redis://:pje_redis_2026@redis:6379\n'
              printf 'DOWNLOAD_BASE_DIR=/data/downloads\n'
              printf 'HEALTH_PORT=8006\n'
              printf 'DASHBOARD_PORT=8007\n'
            } > /opt/pje-download/.env

      - name: Restart dashboard
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/pje-download
            docker compose up -d --build dashboard
            if docker ps --format '{{.Names}}' | grep -qx 'pje-worker'; then
              echo "Worker running on VPS; rebuilding worker too"
              docker compose --profile worker up -d --build worker
            else
              echo "Worker not running on VPS; skipping worker deploy"
            fi
            echo "Waiting for healthcheck..."
            sleep 5
            curl -sf http://localhost:8007/api/status
            echo "Deploy OK"
